name: Build Nix tools bundle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-tools:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build installable tools package
        run: |
          nix build ./nix#packages.${{ matrix.system }}.dotfiles-tools

      - name: Export Nix closure as portable artifact
        shell: bash
        run: |
          set -euo pipefail
          STORE_PATH="$(nix path-info ./nix#packages.${{ matrix.system }}.dotfiles-tools)"

          mkdir -p dist/cache
          nix copy --to "file://$PWD/dist/cache" ./nix#packages.${{ matrix.system }}.dotfiles-tools

          printf '%s\n' "${STORE_PATH}" > dist/store-path.txt
          printf '%s\n' "${{ matrix.system }}" > dist/system.txt

          tar -C dist -czf "dotfiles-tools-${{ matrix.system }}.tgz" cache store-path.txt system.txt

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotfiles-tools-${{ matrix.system }}
          path: dotfiles-tools-${{ matrix.system }}.tgz
